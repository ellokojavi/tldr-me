<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Article Summarizer — Settings</title>
    <style>
      body {
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        max-width: 560px; margin: 40px auto; padding: 0 20px; color: #1a202c;
        line-height: 1.5;
      }
      h1 { font-size: 20px; }
      label { display: block; font-weight: 600; margin: 18px 0 6px; }
      input, select {
        width: 100%; padding: 9px 10px; font-size: 14px;
        border: 1px solid #cbd5e0; border-radius: 6px; box-sizing: border-box;
      }
      .hint { font-size: 12px; color: #718096; margin-top: 6px; }
      button {
        margin-top: 20px; background: #2b6cb0; color: #fff; border: none;
        border-radius: 6px; padding: 10px 18px; font-size: 14px; cursor: pointer;
      }
      button:hover { background: #2c5282; }
      #status { margin-left: 12px; font-size: 13px; color: #2f855a; }
    </style>
  </head>
  <body>
    <h1>Article TL;DR Summarizer</h1>
    <p>Enter your MiniMax API key. It is stored only in this browser's local extension storage.</p>

    <label for="apiKey">MiniMax API key</label>
    <input id="apiKey" type="password" placeholder="Paste your API key" autocomplete="off" />
    <div class="hint">Get a key from your MiniMax platform dashboard (platform.minimax.io).</div>

    <label for="model">Model</label>
    <select id="model">
      <option value="MiniMax-M2.7">MiniMax-M2.7</option>
      <option value="MiniMax-M2.5">MiniMax-M2.5</option>
      <option value="MiniMax-M2.1">MiniMax-M2.1</option>
      <option value="MiniMax-M2">MiniMax-M2</option>
      <option value="MiniMax-M3">MiniMax-M3</option>
    </select>
    <div class="hint">Defaults to MiniMax-M2.7.</div>

    <div>
      <button id="save">Save</button>
      <span id="status"></span>
    </div>

    <script src="options.js"></script>
  </body>
</html>
